name: Build and Release EternalSky

# Релиз собирается только при пуше тега версии (например v2.0.0),
# чтобы случайный коммит в main не уезжал сразу всем игрокам.
on:
  push:
    tags: [ "v*" ]

# Даем гитхабу права на создание и перезапись релизов
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # 1. Забираем твой код
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Ставим Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Собираем JAR и сразу запаковываем его в EXE
      - name: Build with Maven
        run: mvn clean package

      # 4. Публикуем релиз с номером версии (для истории)
      - name: Upload versioned release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "EternalSky ${{ github.ref_name }}"
          body: "Автоматическая сборка версии ${{ github.ref_name }}."
          artifacts: "target/EternalSky.exe"
          allowUpdates: true
          makeLatest: true

      # 5. Обновляем релиз "latest" — на него указывает ссылка автообновления
      #    в уже установленных лаунчерах (version-version.json -> releases/download/latest/...)
      - name: Update "latest" release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Актуальная версия (Latest Build)"
          body: "Лаунчер был автоматически собран из версии ${{ github.ref_name }}."
          artifacts: "target/EternalSky.exe"
          allowUpdates: true
          makeLatest: false
